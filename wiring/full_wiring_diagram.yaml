connections:
  # === POWER INPUT CHAIN ===
  -
    - Batt: [1]
    - CABLE - Batt to Sw: [1]
    - Sw: [1]
  -
    - Sw: [2]
    - CABLE - Switch to Term: [1]
    - Term: [1]
  -
    - Batt: [2]
    - CABLE - Batt GND: [1]
    - Term: [2]
  -
    - Term: [1]
    - CABLE - Term + to PB: [1]
    - PB: [1]
  -
    - Term: [2]
    - CABLE - Term GND to PB: [1]
    - PB: [2]

  # === REGULATOR ===
  -
    - PB: [1, 2]
    - CABLE - PB to Reg: [1, 2]
    - Reg: [1, 2]
  -
    - Reg: [3]
    - CABLE - Reg 5V Out: [1]
    - PB: [3]

  # === 5V DISTRIBUTION ===
  -
    - PB: [3]
    - CABLE - 5V to P: [1]
    - P: [11]
  -
    - PB: [3]
    - CABLE - 5V to Pi: [1]
    - Pi: [1]

  # === GND DISTRIBUTION ===
  -
    - PB: [2]
    - CABLE - GND to P: [1]
    - P: [3]
  -
    - PB: [2]
    - CABLE - GND to Pi: [1]
    - Pi: [2]
  -
    - PB: [2]
    - CABLE - GND to IMU: [1]
    - IMU: [2]

  # === 3V3 ===
  -
    - P: [10]
    - CABLE - 3V3 from P: [1]
    - PB: [4]
  -
    - PB: [4]
    - CABLE - 3V3 to IMU: [1]
    - IMU: [1]

  # === UART ===
  -
    - P: [1, 2]
    - CABLE - UART P Side: [1, 2]
    - PB: [5, 6]
  -
    - PB: [5, 6]
    - CABLE - UART Pi Side: [1, 2]
    - Pi: [4, 3]

  # === I2C ===
  -
    - P: [4, 5]
    - CABLE - I2C P Side: [1, 2]
    - PB: [7, 8]
  -
    - PB: [7, 8]
    - CABLE - I2C IMU Side: [1, 2]
    - IMU: [3, 4]

  # === ENCODER SIGNALS ===
  -
    - P: [6, 7]
    - CABLE - Left Enc Sig: [1, 2]
    - PB: [9, 10]
  -
    - P: [8, 9]
    - CABLE - Right Enc Sig: [1, 2]
    - PB: [11, 12]

  # === LEFT MOTOR ===
  -
    - Shim: [1, 2]
    - CABLE - LM Drive: [1, 2]
    - LM: [1, 2]
  -
    - PB: [4, 2, 9, 10]
    - CABLE - LM Enc Cable: [1, 2, 3, 4]
    - LM: [3, 4, 5, 6]

  # === RIGHT MOTOR ===
  -
    - Shim: [3, 4]
    - CABLE - RM Drive: [1, 2]
    - RM: [1, 2]
  -
    - PB: [4, 2, 11, 12]
    - CABLE - RM Enc Cable: [1, 2, 3, 4]
    - RM: [3, 4, 5, 6]
