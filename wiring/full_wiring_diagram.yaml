metadata:
  title: Rollie Mk. I - Full Wiring Diagram
  description: Self-balancing spherical robot - complete wiring harness
  notes: "Split-Brain architecture: Pico (reflexes) + Pi Zero 2W (cognition)"

connectors:
  Batt:
    type: GNB 7.4V 2S LiPo
    subtype: XT30
    pinlabels: [V+, V-]
    notes: Battery

  Sw:
    type: Toggle Switch
    pinlabels: [IN, OUT]
    notes: Main power switch

  Term:
    type: Screw Terminal 5mm
    subtype: 2-pin
    pinlabels: ["+", "-"]
    notes: CE08311

  PB:
    type: ProtoBoard 58x78mm
    subtype: FIT0203
    pinlabels:
      - Screw + In     # 1
      - GND Rail       # 2
      - 5V Rail        # 3
      - 3V3 Rail       # 4
      - UART TX        # 5
      - UART RX        # 6
      - I2C SDA        # 7
      - I2C SCL        # 8
      - Left Enc A     # 9
      - Left Enc B     # 10
      - Right Enc A    # 11
      - Right Enc B    # 12
    notes: "Central hub with soldered power rails and signal pads"

  Reg:
    type: Pololu D24V30F5
    subtype: Step-Down 5V 3.2A
    pinlabels: [VIN, GND, VOUT 5V]
    notes: "POLOLU-3782"

  P:
    type: Raspberry Pi Pico H
    pinlabels:
      - GP0 TX         # 1
      - GP1 RX         # 2
      - GND            # 3
      - GP4 SDA        # 4
      - GP5 SCL        # 5
      - GP10 Enc LA    # 6
      - GP11 Enc LB    # 7
      - GP12 Enc RA    # 8
      - GP13 Enc RB    # 9
      - 3V3 OUT        # 10
      - VSYS 5V        # 11
    notes: "CE08702 - Reflexes (500Hz control loop)"

  Shim:
    type: Pimoroni Motor SHIM
    subtype: DRV8833
    pinlabels: [M1+, M1-, M2+, M2-]
    notes: "PIM617 - Soldered onto Pico"

  Pi:
    type: Raspberry Pi Zero 2 W
    pinlabels: [5V In, GND, TX GPIO14, RX GPIO15]
    notes: "CE08211 - Cognition (Linux, WiFi, Camera)"

  IMU:
    type: Adafruit BNO055
    subtype: STEMMA QT
    pinlabels: [VIN, GND, SDA, SCL]
    notes: "ADA4646 - 9-DOF Orientation Sensor"

  LM:
    type: Pololu 50:1 HP 6V
    subtype: w/ 12 CPR Encoder
    pinlabels: [Motor +, Motor -, Enc VCC, Enc GND, Enc A, Enc B]
    notes: "POLOLU-5161"

  RM:
    type: Pololu 50:1 HP 6V
    subtype: w/ 12 CPR Encoder
    pinlabels: [Motor +, Motor -, Enc VCC, Enc GND, Enc A, Enc B]
    notes: "POLOLU-5161"

